<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>inert attribute</title>
		<style>
			form {
					text-align: center;
					padding: 20px;
			}

			label {
					display: block;
					padding: 10px 0;
			}

			button {
					display: block;
					margin: 0 auto;
			}

			input {
				border: 1px solid #000;
			}

			input, select, button {
					outline: none;
			}

			input:focus-visible,
			select:focus-visible,
			button:focus-visible {
				border: 2px dashed crimson;
			}

			button {
				margin-top: 20px;
				margin-bottom: 10px;
				padding: 10px;
			}
		</style>
	</head>

	<body>

		<tr>
			<td style="text-align:center;">
				<table role="presentation" style="margin:0 auto;">

					<tr>
						<td style="text-align:center;">
							<p style="font-weight:700">
								Below should not be active on focus, tab or click.
							</p>
						</td>
					</tr>

					<tr>
						<td>
							<form class="form" inert>
								<p>Which flavor would you like to order?</p>
								<label>Full Name: <input name="firstName" type="text" /></label>
								<label
										>Flavor:
										<select name="flavor">
										<option>Cherry</option>
										<option>Green Tea</option>
										<option>Moose Tracks</option>
										<option>Mint Chip</option>
										</select>
								</label>
							
								<button class="button">:focus-visible</button>
							</form>
						</td>
					</tr>


				</table>
			</td>
		</tr>


	</body>

</html>
